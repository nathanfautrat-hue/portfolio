<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Contact — Louis Gimonet</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .contact {
    background: var(--bg);
    padding: 180px 48px 140px;
    min-height: 100vh;
  }
  .contact__wrap {
    max-width: 880px;
    margin: 0 auto;
  }
  .contact__eyebrow {
    font-weight: 300;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    font-size: 12px;
    color: var(--silver);
    margin-bottom: 24px;
  }
  .contact__title {
    font-weight: 700;
    font-size: clamp(36px, 5vw, 64px);
    color: var(--fg);
    text-transform: uppercase;
    letter-spacing: 0.02em;
    line-height: 1.05;
    margin-bottom: 60px;
  }
  .form {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }
  .form__field--full { grid-column: 1 / -1; }

  .form input,
  .form textarea {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(201,201,201,0.15);
    color: var(--fg);
    font-family: 'Manrope', sans-serif;
    font-weight: 300;
    font-size: 15px;
    padding: 18px 22px;
    border-radius: 4px;
    transition: border-color .4s ease, background .4s ease;
    cursor: crosshair;
  }
  .form input::placeholder,
  .form textarea::placeholder {
    color: var(--muted);
    font-weight: 300;
  }
  .form input:focus,
  .form textarea:focus {
    outline: none;
    border-color: var(--silver);
    background: rgba(255,255,255,0.06);
  }
  .form textarea {
    min-height: 180px;
    resize: vertical;
    font-family: 'Manrope', sans-serif;
  }
  .form__actions {
    grid-column: 1 / -1;
    margin-top: 12px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    padding: 1rem 2rem;
    font-family: 'Manrope', sans-serif;
    font-size: 12px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    font-weight: 500;
    cursor: crosshair;
    border: 1px solid var(--fg);
    background: var(--fg);
    color: var(--bg);
    transition: all .4s ease;
    text-decoration: none;
  }
  .btn:hover {
    background: transparent;
    color: var(--fg);
  }
  .btn__arrow { transition: transform .3s ease; display: inline-block; }
  .btn:hover .btn__arrow { transform: translateX(4px); }

  .contact__alt {
    margin-top: 80px;
    padding-top: 40px;
    border-top: 1px solid rgba(110,110,115,0.2);
    display: flex;
    flex-wrap: wrap;
    gap: 48px;
  }
  .contact__alt-item {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .contact__alt-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.3em;
    color: var(--muted);
  }
  .contact__alt-value {
    font-weight: 300;
    font-size: 16px;
    color: var(--silver);
    transition: color .4s ease;
  }
  .contact__alt-value:hover { color: var(--fg); }

  @media (max-width: 768px) {
    .contact { padding: 130px 24px 80px; }
    .form { grid-template-columns: 1fr; }
    .contact__alt { gap: 28px; }
  }
</style>
</head>
<body>

<nav class="nav nav--solid" id="nav">
  <a href="index.html" class="nav__logo">Louis Gimonet</a>
  <ul class="nav__links">
    <li><a href="travaux.html">Travaux</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="about.html">À propos</a></li>
    <li><a href="contact.html" class="active">Contact</a></li>
  </ul>
</nav>

<section class="contact">
  <div class="contact__wrap">
    <p class="contact__eyebrow">Prochain projet — le vôtre ?</p>
    <h1 class="contact__title">Parlons de votre projet.</h1>

    <form class="form" id="contactForm" novalidate>
      <div class="form__field">
        <input type="text" id="firstname" name="firstname" placeholder="Prénom" required />
      </div>
      <div class="form__field">
        <input type="text" id="lastname" name="lastname" placeholder="Nom" required />
      </div>
      <div class="form__field form__field--full">
        <input type="email" id="email" name="email" placeholder="Email" required />
      </div>
      <div class="form__field form__field--full">
        <textarea id="message" name="message" placeholder="Décrivez votre projet…" required></textarea>
      </div>
      <div class="form__actions">
        <button type="submit" class="btn">Envoyer le mail <span class="btn__arrow">→</span></button>
      </div>
    </form>

    <div class="contact__alt">
      <div class="contact__alt-item">
        <span class="contact__alt-label">Email</span>
        <a class="contact__alt-value" href="mailto:contact@lgvideo.fr">contact@lgvideo.fr</a>
      </div>
      <div class="contact__alt-item">
        <span class="contact__alt-label">Téléphone</span>
        <a class="contact__alt-value" href="tel:0686583654">06 86 58 36 54</a>
      </div>
      <div class="contact__alt-item">
        <span class="contact__alt-label">Instagram</span>
        <a class="contact__alt-value" href="https://www.instagram.com/louisgim" target="_blank" rel="noopener">@louisgim</a>
      </div>
    </div>
  </div>
</section>

<footer class="footer">
  <div>Louis Gimonet — Vidéaste</div>
  <div class="footer__social">
    <a href="https://www.instagram.com/louisgim" target="_blank" rel="noopener">Instagram</a>
    <a href="tel:0686583654">06 86 58 36 54</a>
  </div>
  <div>© 2026 lgvideo.fr</div>
</footer>

<script>
  document.getElementById('contactForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const fn = document.getElementById('firstname').value.trim();
    const ln = document.getElementById('lastname').value.trim();
    const em = document.getElementById('email').value.trim();
    const msg = document.getElementById('message').value.trim();
    const subject = encodeURIComponent('Nouveau projet — ' + fn + ' ' + ln);
    const body = encodeURIComponent(
      'Prénom : ' + fn + '\n' +
      'Nom : ' + ln + '\n' +
      'Email : ' + em + '\n\n' +
      'Projet :\n' + msg
    );
    window.location.href = 'mailto:contact@lgvideo.fr?subject=' + subject + '&body=' + body;
  });
</script>

</body>
</html>
