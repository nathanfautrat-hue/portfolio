<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Louis Gimonet — Vidéaste & Drone</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
<style>
  .hero {
    position: relative;
    height: 100vh;
    width: 100%;
    overflow: hidden;
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
  }
  .hero__video {
    position: absolute;
    inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 0;
  }
  .hero__overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 1;
  }
  .hero__content {
    position: relative;
    z-index: 2;
    padding: 0 24px;
  }
  .hero__title {
    font-weight: 200;
    font-size: clamp(36px, 5vw, 80px);
    color: var(--light);
    letter-spacing: -0.01em;
    line-height: 1.1;
  }
  .hero__sub {
    margin-top: 24px;
    font-weight: 300;
    font-size: 13px;
    color: var(--silver);
    letter-spacing: 0.1em;
  }
  .hero__chevron {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
    color: var(--silver);
    animation: pulse 2.4s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 0.4; transform: translate(-50%, 0); }
    50% { opacity: 1; transform: translate(-50%, 8px); }
  }
</style>
</head>
<body>

<nav class="nav" id="nav">
  <a href="index.html" class="nav__logo">Louis Gimonet</a>
  <ul class="nav__links">
    <li><a href="travaux.html">Travaux</a></li>
    <li><a href="services.html">Services</a></li>
    <li><a href="about.html">À propos</a></li>
    <li><a href="contact.html">Contact</a></li>
  </ul>
</nav>

<header class="hero">
  <video class="hero__video" autoplay muted loop playsinline>
    <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
  </video>
  <div class="hero__overlay"></div>
  <div class="hero__content">
    <h1 class="hero__title">Capturer. Raconter. Ressentir.</h1>
    <p class="hero__sub">Vidéaste · Drone · Production audiovisuelle</p>
  </div>
  <a href="travaux.html" class="hero__chevron" aria-label="Voir les travaux">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </a>
</header>

<footer class="footer">
  <div>Louis Gimonet — Vidéaste</div>
  <div class="footer__social">
    <a href="https://www.instagram.com/louisgim" target="_blank" rel="noopener">Instagram</a>
    <a href="tel:0686583654">06 86 58 36 54</a>
  </div>
  <div>© 2026 lgvideo.fr</div>
</footer>

<script>
  const nav = document.getElementById('nav');
  window.addEventListener('scroll', () => {
    if (window.scrollY > 60) nav.classList.add('scrolled');
    else nav.classList.remove('scrolled');
  });
</script>

</body>
</html>
